name: Update V2Ray Sub Link

on:
  schedule:
    # این دستور اتوماسیون را هر ۶ ساعت یک‌بار خودکار اجرا می‌کند
    - cron: '0 */6 * * *'
  workflow_dispatch: # این گزینه اجازه می‌دهد دستی هم اجرا کنی

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Python Script
      run: python main.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add my_sub.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 ساب‌لینک خودکار آپدیت شد" && git push)
